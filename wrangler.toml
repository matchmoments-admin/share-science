# share-science — Cloudflare Worker config.
# Resource IDs are placeholders: provision with the commands in README.md, then paste the
# returned IDs here. Local runtime is deploy-only on macOS 12.6 (workerd won't run) — verify
# with `npm run typecheck` then deploy.

name = "share-science"
main = "src/index.ts"
compatibility_date = "2025-01-09"
compatibility_flags = ["nodejs_compat"]

# Custom domain. The zone shareo.co must be on this Cloudflare account; wrangler creates the
# custom-domain DNS automatically on deploy. workers_dev kept on so the old URL still works during
# the cutover — set to false once shareo.co is verified to fully retire it.
workers_dev = true
routes = [
  { pattern = "shareo.co", custom_domain = true },
  { pattern = "www.shareo.co", custom_domain = true },
]

# Default vars. PUBLIC_PRICES gates raw-price display: keep "off" to stay on the EODHD
# personal tier (publish derived returns/alpha only — see LEGAL.md + the cost-cliff note).
[vars]
PUBLIC_PRICES = "off"
MAX_DAILY_COST_CENTS = "150"  # hard daily ceiling on ALL paid calls (extract + digest + transcribe). Tightened from 500 now that Haiku makes each extraction ~10c; over-cap defers to needs_review, never overspends.
EODHD_DAILY_CALL_BUDGET = "5000"  # soft cap on EODHD API calls/day — far under the paid plan's 100k, far over real usage (~60/day). A valuation run defers if exceeded so a runaway can't blow the plan limit.
EXTRACT_MODEL = "claude-haiku-4-5"  # extraction + digest model. Haiku 4.5 ($1/$5 per 1M) ≈ 5x cheaper than Opus 4.8 ($5/$25); extraction is a strict structured tool-call so quality risk is low.
ALPACA_MODE = "paper"      # off | paper | live  — paper-api.alpaca.markets (simulated, no real money)
ALPACA_NOTIONAL_USD = "5"  # $ per real buy (hard-capped at $50 in code)
# Turnstile: set the public site key here to render the /api/subscribe widget, and
# `wrangler secret put TURNSTILE_SECRET_KEY` for server-side verify. Both unset ⇒ fail-open (no widget).
# TURNSTILE_SITE_KEY = "0x..."
# beehiiv delivery: set the publication id here + `wrangler secret put BEEHIIV_API_KEY`.
# Both unset ⇒ subscriber sync / digest publish are logged no-ops.
# BEEHIIV_PUBLICATION_ID = "pub_..."

[[d1_databases]]
binding = "DB"
database_name = "share-science-db"
database_id = "7e0c1426-fee8-43da-af7d-ffc1fdedd5a7"

[[r2_buckets]]
binding = "RAW_MEDIA"
bucket_name = "share-science-raw-media"

[[kv_namespaces]]
binding = "KV"
id = "b4f6d1ce4fe1438388d57289d8165ee5"

[[queues.producers]]
binding = "TIP_INGEST"
queue = "tips-ingest"

[[queues.consumers]]
queue = "tips-ingest"
max_batch_size = 5
max_retries = 3
dead_letter_queue = "tips-ingest-dlq"

# All recurring jobs run from scheduled() and branch on controller.cron.
# hourly = producers (RSS/Bluesky poll); 06:00 UTC daily = valuation/track + ratings; Mon 07:00 UTC = weekly digest.
[triggers]
crons = ["0 * * * *", "0 6 * * *", "0 7 * * 1"]
